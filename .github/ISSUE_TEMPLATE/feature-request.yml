name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["feature-request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow or limitation behind the request.
      placeholder: We need a way to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      placeholder: Add a prop or workflow that ...
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: If you have a workaround today, share it here.
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocks adoption
        - Major productivity issue
        - Nice to have
    validations:
      required: true

